version: '3.8'

networks:
  ophiuchus-network:
    name: ophiuchus-network
    driver: bridge
  cancer-network:
    name: cancer-network
    external: true

services:
  # 🐘 ฐานข้อมูล Postgres ส่วนกลาง (อยู่ลึกสุด)
  shared-postgres:
    image: postgres:17-alpine
    container_name: shared-postgres
    restart: always
    environment:
      POSTGRES_DB: zodiac_default_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SuperSecureDBPassword123}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - ophiuchus-network

  # ☁️ ตัวแทนเชื่อมโยงคลาวด์ตัวหลัก (ทางเข้านอกบ้าน HTTPS สาธารณะ)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    command: tunnel run --token-file /run/secrets/cloudflare_tunnel_token
    secrets:
      - cloudflare_tunnel_token
    networks:
      - ophiuchus-network
      - cancer-network

  # 🚗 Caddy Local Gateway (ทางเข้าในบ้านสำหรับ LAN/WiFi)
  caddy-gateway:
    image: caddy:alpine
    container_name: caddy-gateway
    restart: always
    ports:
      - "80:80"   # ทางเข้า HTTP ปกติในบ้าน
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      ophiuchus-network:
        aliases:
          - sagittarius-frontend
      cancer-network: {}

volumes:
  pg-data:
  caddy-data:
  caddy-config:

secrets:
  cloudflare_tunnel_token:
    file: ./secrets/cloudflare_tunnel_token
