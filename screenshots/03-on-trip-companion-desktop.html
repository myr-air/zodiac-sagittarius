<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>On-Trip Companion (Desktop) - Joii</title>
<style>
  :root { --color-primary:#0d9488; --color-surface:#fff; --color-surface-muted:#f8fafc; --color-border:#e2e8f0; --color-text:#0f172a; --color-text-muted:#64748b; --radius-lg:12px; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Noto Sans Thai', system-ui, sans-serif; background: #f1f5f9; color: var(--color-text); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { max-width: 448px; width: 100%; margin: 24px; padding: 24px; border-radius: var(--radius-lg); border: 1px solid var(--color-border); background: var(--color-surface); display: flex; flex-direction: column; align-items: center; gap: 24px; }
  .card h2 { font-size: 18px; font-weight: 700; }
  .activities { width: 100%; display: flex; flex-direction: column; gap: 6px; }
  .act-item { display: flex; gap: 8px; font-size: 14px; padding: 6px 0; border-bottom: 1px solid var(--color-border); }
  .act-item:last-child { border-bottom: none; }
  .act-time { color: var(--color-text-muted); width: 56px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .qr-placeholder { width: 180px; height: 180px; border: 2px dashed var(--color-border); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--color-text-muted); font-size: 13px; background: var(--color-surface-muted); }
  .muted { font-size: 14px; color: var(--color-text-muted); text-align: center; }
</style>
</head>
<body>
<div class="card">
  <h2>📍 Tokyo Trip — Day 3 (Tue 12)</h2>
  <div class="activities">
    <div class="act-item"><span class="act-time">09:00</span><span>🏯 Senso-ji Temple</span></div>
    <div class="act-item"><span class="act-time">12:00</span><span>🍣 Sushi Dai (Tsukiji)</span></div>
    <div class="act-item"><span class="act-time">14:30</span><span>🏙️ Tokyo Skytree</span></div>
    <div class="act-item"><span class="act-time">17:00</span><span>🍜 Ramen at Ichiran</span></div>
    <div class="act-item"><span class="act-time">20:00</span><span>🍺 Golden Gai</span></div>
  </div>
  <h2>📱 เปิดบนมือถือ — Open on mobile</h2>
  <div class="qr-placeholder">QR Code</div>
  <p class="muted">The trip companion is optimized for mobile devices. Scan the QR code to open on your phone.</p>
</div>
</body>
</html>
