<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>On-Trip Companion - Joii</title>
<style>
  :root {
    --color-primary: #0d9488;
    --color-primary-soft: #ccfbf1;
    --color-surface: #ffffff;
    --color-surface-muted: #f8fafc;
    --color-border: #e2e8f0;
    --color-border-strong: #94a3b8;
    --color-text: #0f172a;
    --color-text-muted: #64748b;
    --color-warning: #f59e0b;
    --color-warning-soft: #fef3c7;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans Thai', system-ui, sans-serif; background: #f1f5f9; color: var(--color-text); }
  .phone-frame { max-width: 390px; margin: 0 auto; background: var(--color-surface); min-height: 844px; border: 1px solid var(--color-border); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }
  
  /* Day Switcher */
  .day-strip { display: flex; overflow-x: auto; gap: 6px; padding: 10px 12px; background: var(--color-surface); border-bottom: 1px solid var(--color-border); scrollbar-width: none; }
  .day-strip::-webkit-scrollbar { display: none; }
  .day-chip { height: 48px; padding: 0 16px; border-radius: var(--radius-md); border: none; cursor: pointer; white-space: nowrap; font-size: 13px; font-weight: 500; background: var(--color-surface); color: var(--color-text-muted); }
  .day-chip.active { background: var(--color-primary); color: white; font-weight: 600; }
  
  /* Content */
  .content { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
  
  /* Now Card */
  .now-card { border-left: 4px solid var(--color-primary); border-radius: var(--radius-md); background: var(--color-surface); padding: 16px; }
  .now-time { font-size: 20px; color: var(--color-primary); font-weight: 700; font-variant-numeric: tabular-nums; }
  .now-name { font-size: 18px; font-weight: 600; margin-top: 4px; }
  .countdown { font-size: 14px; color: var(--color-warning); font-weight: 600; margin-top: 4px; }
  
  /* Next Card */
  .next-card { border-radius: var(--radius-md); background: var(--color-surface-muted); padding: 12px; }
  .next-time { font-size: 16px; color: var(--color-text-muted); }
  .next-name { font-size: 14px; color: var(--color-text-muted); margin-top: 2px; }
  
  /* Actions */
  .actions { display: flex; gap: 8px; }
  .nav-btn { flex: 1; height: 44px; background: var(--color-primary); color: white; border: none; border-radius: var(--radius-md); font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .check-btn { flex: 1; height: 44px; background: var(--color-surface); border: 1px solid var(--color-border-strong); border-radius: var(--radius-md); font-size: 15px; cursor: pointer; }
  
  /* Upcoming */
  .upcoming-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--color-border); font-size: 14px; }
  .upcoming-item:last-child { border-bottom: none; }
  .upcoming-time { color: var(--color-text-muted); width: 48px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  
  /* Bottom Nav */
  .bottom-nav { height: 56px; border-top: 1px solid var(--color-border); display: flex; align-items: stretch; background: var(--color-surface); }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; min-width: 44px; cursor: pointer; font-size: 11px; color: var(--color-text-muted); border-top: 2px solid transparent; }
  .nav-item.active { color: var(--color-primary); border-top-color: var(--color-primary); }
  .nav-icon { font-size: 20px; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="day-strip">
    <button class="day-chip">Mon 11</button>
    <button class="day-chip active">Tue 12</button>
    <button class="day-chip">Wed 13</button>
    <button class="day-chip">Thu 14</button>
    <button class="day-chip">Fri 15</button>
  </div>
  
  <div class="content">
    <!-- Now Card -->
    <div class="now-card">
      <div class="now-time">14:30 – 16:00</div>
      <div class="now-name">🏯 Senso-ji Temple & Nakamise Street</div>
      <div class="countdown">⚠ เหลือ 45 นาที</div>
    </div>
    
    <!-- Action Buttons -->
    <div class="actions">
      <button class="nav-btn">📍 นำทาง →</button>
      <button class="check-btn">✓ ทำเสร็จ</button>
    </div>
    
    <!-- Next Card -->
    <div class="next-card">
      <div style="font-size:11px;font-weight:600;color:var(--color-text-muted);text-transform:uppercase;margin-bottom:4px">Next — ถัดไป</div>
      <div class="next-time">17:00</div>
      <div class="next-name">🍜 Ramen at Ichiran (Asakusa)</div>
    </div>
    
    <!-- Upcoming -->
    <div style="margin-top:8px">
      <div style="font-size:11px;font-weight:600;color:var(--color-text-muted);text-transform:uppercase;margin-bottom:8px">Upcoming — ถัดไป</div>
      <div class="upcoming-item">
        <span class="upcoming-time">18:30</span>
        <span>🌉 Tokyo Skytree night view</span>
      </div>
      <div class="upcoming-item">
        <span class="upcoming-time">20:00</span>
        <span>🍺 Drinks at Golden Gai</span>
      </div>
    </div>
  </div>
  
  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item active">
      <span class="nav-icon">🕐</span>
      ตอนนี้
    </div>
    <div class="nav-item">
      <span class="nav-icon">🗺️</span>
      แผนที่
    </div>
    <div class="nav-item">
      <span class="nav-icon">📋</span>
      รายการ
    </div>
    <div class="nav-item">
      <span class="nav-icon">💰</span>
      ค่าใช้จ่าย
    </div>
  </div>
</div>
</body>
</html>
