openapi: 3.1.0
info:
  title: Sagittarius Itinerary Table V1
  version: 1.0.0
paths:
  /api/v1/account/trips:
    post:
      summary: Create an account trip with V1 trip metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountTripCreateRequest"
      responses:
        "201":
          description: Trip created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountTripCreateResponse"
  /api/v1/trips/{tripId}:
    get:
      summary: Load the Phase 1 planning cockpit.
      description: Response includes canonical Trip Plan aliases and retained legacy aliases. Mixed aliases must not drift.
      parameters:
        - $ref: "#/components/parameters/TripId"
      responses:
        "200":
          description: Cockpit loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CockpitResponse"
    patch:
      summary: Patch trip core settings and V1 trip metadata.
      description: Phase 1 metadata patch rejects activePlanVariantId and mainTripPlanId pointer mutations with 400 invalid_request. Use /trip-plans/{tripPlanId}/set-main for Main Plan changes.
      parameters:
        - $ref: "#/components/parameters/TripId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripPatchRequest"
      responses:
        "200":
          description: Trip updated.
        "400":
          description: Invalid request, including direct Main Plan pointer mutation.
  /api/v1/trips/{tripId}/trip-plans:
    post:
      summary: Create a canonical Trip Plan.
      description: Phase 1 facade over plan_variants storage. Create cannot set status or kind to main; use set-main.
      parameters:
        - $ref: "#/components/parameters/TripId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripPlanCreateRequest"
      responses:
        "201":
          description: Trip Plan created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripPlanSummary"
        "400":
          description: Invalid status, kind/status mismatch, unsupported creation mode, or illegal sourceTripPlanId.
  /api/v1/trips/{tripId}/trip-plans/{tripPlanId}:
    patch:
      summary: Patch a canonical Trip Plan.
      description: Phase 1 facade over plan_variants storage. Patch cannot set status or kind to main; use set-main.
      parameters:
        - $ref: "#/components/parameters/TripId"
        - $ref: "#/components/parameters/TripPlanId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripPlanPatchRequest"
      responses:
        "200":
          description: Trip Plan patched.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripPlanSummary"
        "400":
          description: Invalid request.
        "409":
          description: Version conflict with latest Trip Plan summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionConflictTripPlanResponse"
  /api/v1/trips/{tripId}/trip-plans/{tripPlanId}/set-main:
    post:
      summary: Select a Trip Plan as the Main Plan.
      description: Explicit Main Plan mutation. Phase 1 has no expectedVersion; duplicate clientMutationId values are rejected by the mutation guard.
      parameters:
        - $ref: "#/components/parameters/TripId"
        - $ref: "#/components/parameters/TripPlanId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetMainTripPlanRequest"
      responses:
        "200":
          description: Trip summary with canonical and legacy Main Plan aliases.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripSummary"
        "400":
          description: Invalid previousMainNextStatus.
  /api/v1/trips/{tripId}/plan-variants:
    post:
      summary: Legacy Trip Plan create route retained during Phase 1 compatibility.
      deprecated: true
      parameters:
        - $ref: "#/components/parameters/TripId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripPlanCreateRequest"
      responses:
        "201":
          description: Plan variant created with canonical status alias.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripPlanSummary"
  /api/v1/trips/{tripId}/plan-variants/{planVariantId}:
    patch:
      summary: Legacy Trip Plan patch route retained during Phase 1 compatibility.
      deprecated: true
      parameters:
        - $ref: "#/components/parameters/TripId"
        - $ref: "#/components/parameters/PlanVariantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripPlanPatchRequest"
      responses:
        "200":
          description: Plan variant patched with canonical status alias.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripPlanSummary"
        "400":
          description: Invalid request.
        "409":
          description: Version conflict with latest Trip Plan summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionConflictTripPlanResponse"
  /api/v1/trips/{tripId}/plan-variants/{planVariantId}/publications:
    post:
      summary: Legacy Main Plan selection route retained during Phase 1 compatibility.
      deprecated: true
      parameters:
        - $ref: "#/components/parameters/TripId"
        - $ref: "#/components/parameters/PlanVariantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetMainTripPlanRequest"
      responses:
        "200":
          description: Trip summary with canonical and legacy Main Plan aliases.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripSummary"
  /api/v1/trips/{tripId}/itinerary-items:
    post:
      summary: Create an itinerary item with V1 hierarchy, timing, and details fields.
      parameters:
        - $ref: "#/components/parameters/TripId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItineraryItemCreateRequest"
      responses:
        "201":
          description: Itinerary item created.
  /api/v1/trips/{tripId}/itinerary-imports:
    post:
      summary: Normalize itinerary import input for a destination Trip Plan.
      description: Phase 1 returns destination Trip Plan aliases, hierarchy/time/path fields, and compatibility records without switching the destination Main Plan.
      parameters:
        - $ref: "#/components/parameters/TripId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItineraryImportRequest"
      responses:
        "200":
          description: Import normalized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItineraryImportResponse"
  /api/v1/trips/{tripId}/itinerary-items/{itemId}:
    patch:
      summary: Patch an itinerary item with V1 hierarchy, timing, and details fields.
      parameters:
        - $ref: "#/components/parameters/TripId"
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [clientMutationId, expectedVersion, patch]
              properties:
                clientMutationId:
                  type: string
                expectedVersion:
                  type: integer
                patch:
                  $ref: "#/components/schemas/ItineraryItemPatch"
      responses:
        "200":
          description: Itinerary item updated.
        "409":
          description: Version conflict.
  /api/v1/trips/{tripId}/plan-checks:
    post:
      summary: Run deterministic Plan Check and store bilingual suggestions.
      parameters:
        - $ref: "#/components/parameters/TripId"
        - name: tripPlanId
          in: query
          required: false
          schema:
            type: string
          description: Optional Trip Plan scope. When omitted, the check covers the full trip for compatibility. When supplied, the Trip Plan id must belong to the trip and does not mutate the Main Plan pointer.
      responses:
        "201":
          description: Plan Check completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanCheck"
  /api/v1/trips/{tripId}/plan-checks/latest:
    get:
      summary: Read the latest Plan Check with stale status.
      parameters:
        - $ref: "#/components/parameters/TripId"
        - name: tripPlanId
          in: query
          required: false
          schema:
            type: string
          description: Optional Trip Plan scope. When provided, returns the latest check for that Trip Plan. The Trip Plan id must belong to the trip and does not mutate the Main Plan pointer.
      responses:
        "200":
          description: Latest Plan Check or null.
  /api/v1/trips/{tripId}/plan-suggestions/{suggestionId}:
    patch:
      summary: Accept, dismiss, or snooze a stored Plan Check suggestion.
      parameters:
        - $ref: "#/components/parameters/TripId"
        - name: suggestionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanSuggestionPatchRequest"
      responses:
        "200":
          description: Plan suggestion updated.
        "409":
          description: Version conflict.
components:
  parameters:
    TripId:
      name: tripId
      in: path
      required: true
      schema:
        type: string
    TripPlanId:
      name: tripPlanId
      in: path
      required: true
      schema:
        type: string
    PlanVariantId:
      name: planVariantId
      in: path
      required: true
      schema:
        type: string
  schemas:
    TripSummary:
      type: object
      required: [id, activePlanVariantId, mainTripPlanId, version]
      properties:
        id:
          type: string
        activePlanVariantId:
          type: string
          deprecated: true
        mainTripPlanId:
          type: string
        version:
          type: integer
    CockpitResponse:
      type: object
      required: [trip, planVariants, tripPlans, itineraryItems]
      properties:
        trip:
          $ref: "#/components/schemas/TripSummary"
        planVariants:
          type: array
          deprecated: true
          items:
            $ref: "#/components/schemas/TripPlanSummary"
        tripPlans:
          type: array
          items:
            $ref: "#/components/schemas/TripPlanSummary"
        itineraryItems:
          type: array
          items:
            $ref: "#/components/schemas/ItineraryItem"
    AccountTripCreateResponse:
      type: object
      required: [trip]
      properties:
        trip:
          $ref: "#/components/schemas/TripSummary"
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    VersionConflictTripPlanResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          required: [latest]
          properties:
            code:
              const: version_conflict
            latest:
              $ref: "#/components/schemas/TripPlanSummary"
    TripPlanSummary:
      type: object
      required: [id, tripId, name, kind, status, description, version]
      properties:
        id:
          type: string
        tripId:
          type: string
        name:
          type: string
        kind:
          enum: [main, backup, draft, split]
          deprecated: true
        status:
          enum: [main, draft, proposal, backup]
        description:
          type: string
        version:
          type: integer
    TripPlanCreateRequest:
      type: object
      required: [clientMutationId, name]
      properties:
        clientMutationId:
          type: string
        name:
          type: string
        status:
          enum: [draft, proposal, backup]
        kind:
          enum: [backup, draft, split]
          deprecated: true
        description:
          type: string
        creationMode:
          enum: [blank]
          description: Phase 1 supports only blank creation. Omitted value also means blank.
        sourceTripPlanId:
          type: string
          description: Rejected in Phase 1 unless a later non-blank creation mode supports it.
    TripPlanPatchRequest:
      type: object
      required: [clientMutationId, expectedVersion, patch]
      properties:
        clientMutationId:
          type: string
        expectedVersion:
          type: integer
        patch:
          type: object
          properties:
            name:
              type: string
            status:
              enum: [draft, proposal, backup]
            kind:
              enum: [backup, draft, split]
              deprecated: true
            description:
              type: string
    SetMainTripPlanRequest:
      type: object
      required: [clientMutationId]
      properties:
        clientMutationId:
          type: string
        previousMainNextStatus:
          enum: [draft, proposal, backup]
    AccountTripCreateRequest:
      type: object
      required: [name, destinationLabel, startDate, endDate]
      properties:
        name:
          type: string
        destinationLabel:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        partySize:
          type: integer
          minimum: 1
        defaultTimezone:
          type: string
    TripPatchRequest:
      type: object
      required: [clientMutationId, expectedVersion]
      properties:
        clientMutationId:
          type: string
        expectedVersion:
          type: integer
        name:
          type: string
        destinationLabel:
          type: string
        countries:
          type: array
          items:
            type: string
        partySize:
          type: integer
          minimum: 1
        defaultTimezone:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        activePlanVariantId:
          type: string
          deprecated: true
          description: Legacy pointer alias. Phase 1 metadata patch rejects this field; use /trip-plans/{tripPlanId}/set-main.
        mainTripPlanId:
          type: string
          description: Canonical pointer alias. Phase 1 metadata patch rejects this field; use /trip-plans/{tripPlanId}/set-main.
    ItineraryItemCreateRequest:
      allOf:
        - $ref: "#/components/schemas/ItineraryItemPatch"
        - type: object
          required: [clientMutationId, day, activity, activityType]
          properties:
            clientMutationId:
              type: string
            planVariantId:
              type: string
    ItineraryItemPatch:
      type: object
      properties:
        pathGroupId:
          type: string
        pathId:
          type: string
        pathName:
          type: string
        pathRole:
          enum: [main, alternative]
        parentItemId:
          type: [string, "null"]
        itemKind:
          enum: [travel, activity, lodging, meal, note, preparation, foodRecommendation]
        timeMode:
          enum: [scheduled, flexible]
        isPlanBlock:
          type: boolean
        status:
          enum: [idea, planned, booked, confirmed, done, skipped]
        priority:
          enum: [low, normal, high, must]
        day:
          type: string
          format: date
        sortOrder:
          type: integer
        startTime:
          type: [string, "null"]
        durationMinutes:
          type: [integer, "null"]
        endTime:
          type: [string, "null"]
        endOffsetDays:
          type: integer
          minimum: 0
          maximum: 7
        activity:
          type: string
        activityType:
          enum: [travel, food, shopping, attraction, experience, stay]
        place:
          type: string
        details:
          type: object
          additionalProperties: true
    ItineraryItem:
      allOf:
        - $ref: "#/components/schemas/ItineraryItemPatch"
        - type: object
          required: [id, tripId, planVariantId, day, sortOrder, activity, activityType, version]
          properties:
            id:
              type: string
            tripId:
              type: string
            planVariantId:
              type: string
            version:
              type: integer
    ItineraryImportRequest:
      type: object
      required: [clientMutationId, mode, content]
      properties:
        clientMutationId:
          type: string
        fileName:
          type: string
        contentType:
          type: string
        mode:
          enum: [auto, json, ai]
        content:
          type: string
        targetTripPlanId:
          type: string
          description: Destination Trip Plan selected by the app. Source metadata must not switch the destination Main Plan.
    ItineraryImportResponse:
      type: object
      required: [trip, items, records]
      properties:
        trip:
          type: object
          required: [id, activePlanVariantId, mainTripPlanId, planVariants, tripPlans]
          properties:
            id:
              type: string
            activePlanVariantId:
              type: string
              deprecated: true
            mainTripPlanId:
              type: string
            planVariants:
              type: array
              deprecated: true
              items:
                $ref: "#/components/schemas/TripPlanSummary"
            tripPlans:
              type: array
              items:
                $ref: "#/components/schemas/TripPlanSummary"
        items:
          type: array
          items:
            $ref: "#/components/schemas/ItineraryItem"
        records:
          type: object
          required: [expenses, bookingDocs, stopNotes, tasks]
          properties:
            expenses:
              type: array
              items:
                type: object
                additionalProperties: true
            bookingDocs:
              type: array
              items:
                type: object
                additionalProperties: true
            stopNotes:
              type: array
              items:
                type: object
                additionalProperties: true
            tasks:
              type: array
              items:
                type: object
                additionalProperties: true
    LocalizedText:
      type: object
      required: [en, th]
      properties:
        en:
          type: string
        th:
          type: string
    PlanCheck:
      type: object
      required: [id, tripId, itineraryFingerprint, status, stale, suggestions]
      properties:
        id:
          type: string
        tripId:
          type: string
        tripPlanId:
          type: string
          nullable: true
        itineraryFingerprint:
          type: string
        status:
          enum: [running, complete, failed]
        stale:
          type: boolean
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/PlanSuggestion"
    PlanSuggestion:
      type: object
      required: [id, severity, scope, explanation, recommendedAction, status, version]
      properties:
        id:
          type: string
        severity:
          enum: [info, warning, critical]
        scope:
          enum: [trip, day, item]
        targetItemIds:
          type: array
          items:
            type: string
        explanation:
          $ref: "#/components/schemas/LocalizedText"
        recommendedAction:
          $ref: "#/components/schemas/LocalizedText"
        actionKind:
          type: [string, "null"]
        actionPayload:
          type: object
          additionalProperties: true
        status:
          enum: [pending, accepted, dismissed, snoozed]
        snoozedUntil:
          type: [string, "null"]
        version:
          type: integer
    PlanSuggestionPatchRequest:
      type: object
      required: [clientMutationId, expectedVersion, status]
      properties:
        clientMutationId:
          type: string
        expectedVersion:
          type: integer
        status:
          enum: [accepted, dismissed, snoozed]
        snoozedUntil:
          type: [string, "null"]
