services:
  sagittarius-api:
    image: sagittarius-api:production
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      EMAIL_DELIVERY: ${EMAIL_DELIVERY:?EMAIL_DELIVERY is required}
      EMAIL_FROM: ${EMAIL_FROM:?EMAIL_FROM is required}
      PASSKEY_ALLOWED_ORIGINS: ${PASSKEY_ALLOWED_ORIGINS:?PASSKEY_ALLOWED_ORIGINS is required}
      RUST_LOG: ${RUST_LOG:?RUST_LOG is required}
      SAGITTARIUS_ALLOWED_ORIGINS: ${SAGITTARIUS_ALLOWED_ORIGINS:?SAGITTARIUS_ALLOWED_ORIGINS is required}
      SAGITTARIUS_BIND_ADDR: 0.0.0.0:5181
      SAGITTARIUS_ENV: production
      SAGITTARIUS_SEED_SAMPLE_DATA: "0"
      SENDMAIL_COMMAND: ${SENDMAIL_COMMAND:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
    expose:
      - "5181"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5181/api/v1/readiness >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      zodiac:
        aliases:
          - sagittarius-api

  sagittarius-frontend:
    image: sagittarius-frontend:production
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_SAGITTARIUS_API_BASE_URL: ${NEXT_PUBLIC_SAGITTARIUS_API_BASE_URL:?NEXT_PUBLIC_SAGITTARIUS_API_BASE_URL is required}
        SAGITTARIUS_INTERNAL_API_BASE_URL: ${SAGITTARIUS_INTERNAL_API_BASE_URL:?SAGITTARIUS_INTERNAL_API_BASE_URL is required}
    restart: unless-stopped
    depends_on:
      sagittarius-api:
        condition: service_healthy
    environment:
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SAGITTARIUS_API_BASE_URL: ${NEXT_PUBLIC_SAGITTARIUS_API_BASE_URL:?NEXT_PUBLIC_SAGITTARIUS_API_BASE_URL is required}
      PORT: "5180"
      SAGITTARIUS_INTERNAL_API_BASE_URL: ${SAGITTARIUS_INTERNAL_API_BASE_URL:?SAGITTARIUS_INTERNAL_API_BASE_URL is required}
    expose:
      - "5180"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bun --eval \"fetch('http://localhost:5180').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      zodiac:
        aliases:
          - sagittarius-frontend

networks:
  zodiac:
    external: true
