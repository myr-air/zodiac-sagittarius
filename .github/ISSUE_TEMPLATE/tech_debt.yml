name: Tech debt
description: Track maintainability, workflow, or testing debt.
title: "[Debt]: "
labels:
  - enhancement
  - debt
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What code, workflow, or test surface is affected?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Command output, files, recurring warning, brittle test, or maintenance cost.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What gets slower, riskier, noisier, or harder to change?
    validations:
      required: true
  - type: textarea
    id: suggested_fix
    attributes:
      label: Suggested fix path
    validations:
      required: false
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Commands or checks that prove the cleanup is safe.
    validations:
      required: true
